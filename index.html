#screen{

    align-items: center;

    animation: zoom 2s infinite alternate;
}
    
@keyframes zoom{
    from{transform: scale(1);}
    to{transform: scale(1.2);}
}

.rinbow{
    background: linear-gradient(90deg,

    violet
    );
beckgrauund-size:400%;
-webkit-background-clip: text;

animation:rainbow 4s liner infinite;
}
@keyframes rainbow{
    0%{background-position0:0%;}
