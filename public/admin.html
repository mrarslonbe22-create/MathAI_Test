<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | MathAI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 30px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        
        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        tr:hover {
            background-color: #f5f5f5;
        }
        
        .stats {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .stats p {
            margin: 5px 0;
            font-size: 18px;
        }
        
        .btn-clear {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .btn-clear:hover {
            transform: translateY(-2px);
        }
        
        .refresh-btn {
            background: #4CAF50;
            margin-left: 10px;
        }
        
        .empty-data {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 18px;
        }
        
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            background: #667eea;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 10px;
            text-align: center;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }
        
        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .badge-high {
            background: #4CAF50;
            color: white;
        }
        
        .badge-medium {
            background: #FF9800;
            color: white;
        }
        
        .badge-low {
            background: #f44336;
            color: white;
        }
    </style>
</head>
<body>

<div class="admin-container">
    <h1>📊 Admin Panel - Test Natijalari</h1>
    
    <div class="stats" id="stats">
        <p>📈 Jami test topshirganlar: <strong id="totalCount">0</strong></p>
        <p>⭐ O'rtacha ball: <strong id="avgScore">0</strong>/6</p>
        <p>⏱ O'rtacha vaqt: <strong id="avgTime">0</strong> soniya</p>
    </div>
    
    <div style="overflow-x: auto;">
        <table id="resultsTable">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Ism Familiya</th>
                    <th>Ball</th>
                    <th>Vaqt</th>
                    <th>Sana</th>
                    <th>Zaif mavzular</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="6" class="loading">⏳ Yuklanmoqda...</td><tr>
            </tbody>
        </table>
    </div>

    <div id="emptyMessage" style="display:none;" class="empty-data">
        📭 Hozircha hech qanday natija yo'q
    </div>
    
    <div id="errorMessage" style="display:none;" class="error-message">
        ❌ Ma'lumotlarni yuklashda xatolik yuz berdi
    </div>

    <div class="button-group">
        <button class="btn-clear" onclick="clearData()">🗑 Barcha natijalarni tozalash</button>
        <button class="btn-clear refresh-btn" onclick="loadResults()">🔄 Yangilash</button>
    </div>
    
    <div style="text-align: center;">
        <a href="/" class="back-btn">🏠 Bosh sahifaga qaytish</a>
    </div>
</div>

<script>
// Vaqtni formatlash
function formatTime(seconds) {
    if (!seconds && seconds !== 0) return "Noma'lum";
    const mins = Math.floor(seconds / 60);
    const secs = seconds % 60;
    if (mins > 0) {
        return `${mins} min ${secs} sek`;
    }
    return `${secs} sek`;
}

// Ball bo'yicha rang
function getBallBadge(score) {
    const percent = (score / 6) * 100;
    if (percent >= 80) return '<span class="badge badge-high">Aʼlo</span>';
    if (percent >= 60) return '<span class="badge badge-medium">Yaxshi</span>';
    return '<span class="badge badge-low">Qoniqarsiz</span>';
}

// Ma'lumotlarni yuklash
async function loadResults() {
    const tableBody = document.getElementById("tableBody");
    const emptyMessage = document.getElementById("emptyMessage");
    const errorMessage = document.getElementById("errorMessage");
    
    tableBody.innerHTML = '<tr><td colspan="6" class="loading">⏳ Yuklanmoqda...</td><tr>';
    emptyMessage.style.display = "none";
    errorMessage.style.display = "none";
    
    let allData = [];
    
    // 1. LocalStorage dan o'qish
    try {
        const localData = JSON.parse(localStorage.getItem("results")) || [];
        if (localData.length > 0) {
            allData = [...localData];
            console.log("📊 LocalStorage dan o'qildi:", localData.length);
        }
    } catch (e) {
        console.log("LocalStorage o'qishda xato");
    }
    
    // 2. Serverdan o'qish
    try {
        const response = await fetch('/api/get-results');
        const data = await response.json();
        if (data.success && data.data && data.data.length > 0) {
            // Server ma'lumotlarini qo'shish (takrorlanmasligi uchun)
            const existingIds = new Set(allData.map(d => d.id));
            const newData = data.data.filter(d => !existingIds.has(d.id));
            allData = [...allData, ...newData];
            console.log("📊 Serverdan o'qildi:", data.data.length);
        }
    } catch (error) {
        console.log("Serverga ulanishda xato");
    }
    
    if (allData.length === 0) {
        emptyMessage.style.display = "block";
        tableBody.innerHTML = "";
        document.getElementById("totalCount").innerText = "0";
        document.getElementById("avgScore").innerText = "0";
        document.getElementById("avgTime").innerText = "0";
        return;
    }
    
    displayResults(allData);
}

function displayResults(data) {
    const tableBody = document.getElementById("tableBody");
    const emptyMessage = document.getElementById("emptyMessage");
    
    emptyMessage.style.display = "none";
    
    let totalScore = 0;
    let totalTime = 0;
    let timeCount = 0;
    let html = "";
    
    // Natijalarni vaqt bo'yicha teskari tartibda (eng yangisi birinchi)
    const sortedData = [...data].reverse();
    
    sortedData.forEach((d, index) => {
        let scoreValue = d.score || 0;
        let timeValue = d.timeSpent || null;
        totalScore += scoreValue;
        
        if (timeValue) {
            totalTime += timeValue;
            timeCount++;
        }
        
        // Zaif mavzularni formatlash
        let weakTopicsText = "";
        if (d.weakTopics && d.weakTopics.length > 0) {
            weakTopicsText = d.weakTopics.join(", ");
        } else {
            weakTopicsText = "—";
        }
        
        html += `
            <tr>
                <td>${index + 1}</td>
                <td><strong>${escapeHtml(d.name || 'Noma\'lum')}</strong></td>
                <td>${scoreValue}/6 ${getBallBadge(scoreValue)}</td>
                <td>${formatTime(timeValue)}</td>
                <td>${d.date || 'Noma\'lum'}</td>
                <td><small>${weakTopicsText}</small></td>
            </tr>
        `;
    });
    
    let avgScore = (totalScore / data.length).toFixed(2);
    let avgPercent = Math.round((totalScore / (data.length * 6)) * 100);
    let avgTime = timeCount > 0 ? Math.round(totalTime / timeCount) : 0;
    
    document.getElementById("tableBody").innerHTML = html;
    document.getElementById("totalCount").innerText = data.length;
    document.getElementById("avgScore").innerHTML = `${avgScore}/6 (${avgPercent}%)`;
    document.getElementById("avgTime").innerHTML = formatTime(avgTime);
}

// XSS himoyasi uchun
function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Ma'lumotlarni tozalash
async function clearData() {
    if (confirm("Haqiqatan ham barcha natijalarni o'chirmoqchimisiz?")) {
        try {
            await fetch('/api/clear-results', { method: 'DELETE' });
            localStorage.removeItem("results");
            localStorage.removeItem("userData");
            loadResults();
            alert("✅ Barcha natijalar o'chirildi!");
        } catch (error) {
            localStorage.removeItem("results");
            localStorage.removeItem("userData");
            loadResults();
            alert("✅ Barcha natijalar o'chirildi!");
        }
    }
}

// Sahifa yuklanganda
document.addEventListener('DOMContentLoaded', function() {
    loadResults();
});
</script>

</body>
</html>
